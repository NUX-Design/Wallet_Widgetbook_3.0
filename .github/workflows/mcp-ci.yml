name: MCP CI

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "mcp-server/**"
      - ".github/workflows/mcp-ci.yml"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "mcp-server/**"
      - ".github/workflows/mcp-ci.yml"
  workflow_dispatch:

jobs:
  mcp-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mcp-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install MCP dependencies
        run: npm ci

      - name: Run MCP CI parity workflow
        run: npm run ci:mcp
