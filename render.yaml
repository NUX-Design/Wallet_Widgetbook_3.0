services:
  - type: web
    name: flutter-widget-wallet-mcp
    runtime: node
    plan: free
    rootDir: mcp-server
    buildCommand: npm ci
    startCommand: node http-server.js
    healthCheckPath: /health
    autoDeployTrigger: commit
    # Auto-deploy trigger scope. The service clones the whole repo, so V3
    # sources are always present at build time; these paths only control which
    # commits trigger an automatic redeploy. mcp-server/** covers the server
    # runtime, and the two lib/**/v3/** paths ensure Theme V3 / Widget V3
    # source changes (which the V3 read-only tools serve) also redeploy.
    # skills-v3/** is intentionally excluded because skills run client-side.
    buildFilter:
      paths:
        - mcp-server/**
        - lib/config/themes/v3/**
        - lib/widgets/v3/**
    envVars:
      - key: MCP_REMOTE_HOST
        value: 0.0.0.0
      - key: MCP_REMOTE_PORT
        value: 10000
      - key: MCP_REMOTE_CHANNEL
        value: production
      # Zero-Flutter preview bundle delivery (ZP-13). The service streams the
      # commit-addressed Flutter Web bundle published by the v3-preview-bundle
      # CI workflow. MCP_PREVIEW_BUNDLE_REPO points at the GitHub repo holding
      # the releases; V3_PREVIEW_BUNDLE_BASE_URL is the secret-free URL advertised
      # in previewDelivery. Leave MCP_PREVIEW_BUNDLE_REPO empty to fall back to a
      # local dist/ dir (self-host only).
      - key: MCP_PREVIEW_BUNDLE_REPO
        value: NUX-Design/Wallet_Widgetbook_3.0
      - key: MCP_PREVIEW_BUNDLE_PUBLIC_REPO
        value: true
      - key: V3_PREVIEW_BUNDLE_BASE_URL
        value: https://flutter-widget-wallet-mcp.onrender.com/v3/preview-bundle
      # Secrets below are intentionally not committed with real values.
      # Set them in the Render Dashboard (Environment tab) after the first
      # Blueprint sync. sync: false keeps Render from expecting/overwriting
      # them from this file.
      - key: MCP_REMOTE_BEARER_TOKENS
        sync: false
      - key: MCP_REMOTE_PROXY_SHARED_SECRET
        sync: false
      - key: MCP_REMOTE_REFRESH_TOKEN
        sync: false
      - key: MCP_REMOTE_COMMIT_SHA
        sync: false
      # Only needed if the bundle release repo is PRIVATE (server-side GitHub
      # token for streaming release assets). Public repo => leave unset.
      - key: MCP_PREVIEW_BUNDLE_GH_TOKEN
        sync: false
